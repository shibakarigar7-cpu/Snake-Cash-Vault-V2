<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE VAULT | PLAY & UNLOCK</title>
    <style>
        :root { --neon: #0f0; --dark: #050505; --gold: #ffd700; }
        body { background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; text-align: center; touch-action: manipulation; }
        .vault-container { background: rgba(0, 15, 0, 0.95); border: 2px solid var(--neon); padding: 15px; border-radius: 10px; width: 95%; max-width: 400px; margin: 20px auto; box-shadow: 0 0 20px var(--neon); }
        #game-canvas { border: 2px solid #333; background: #000; display: none; margin: 10px auto; }
        .timer-text { font-size: 1.5rem; color: #fff; margin: 10px 0; }
        .ad-box { margin: 10px 0; min-height: 50px; background: #000; border: 1px dashed #444; overflow: hidden; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #010; border: 1px solid #333; color: var(--neon); box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 15px; background: var(--neon); color: #000; font-weight: bold; border: none; cursor: pointer; }
        .controls { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .control-btn { padding: 15px; background: #222; color: #0f0; border: 1px solid #0f0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="vault-container">
        <h2 style="color:var(--gold); margin:0;">SNAKE VAULT</h2>
        
        <div class="ad-box">
            <iframe data-aa='2429249' src='//acceptable.a-ads.com/2429249?size=320x50' style='width:320px; height:50px; border:0; padding:0; overflow:hidden;'></iframe>
        </div>

        <div id="setup-view">
            <input type="text" id="targetLink" placeholder="Paste Destination URL">
            <button class="btn-primary" onclick="generate()">ENCRYPT LINK</button>
            <div id="result" style="margin-top:10px; display:none; word-break:break-all;"></div>
        </div>

        <div id="unlock-view" style="display:none;">
            <p>Unlock in: <span id="timer" class="timer-text">30</span>s</p>
            <p style="font-size: 0.8rem;">Play Snake to pass time!</p>
            <canvas id="game-canvas" width="300" height="300"></canvas>
            
            <div class="controls" id="controls">
                <div></div><button class="control-btn" onclick="changeDir('UP')">▲</button><div></div>
                <button class="control-btn" onclick="changeDir('LEFT')">◀</button>
                <button class="control-btn" onclick="changeDir('DOWN')">▼</button>
                <button class="control-btn" onclick="changeDir('RIGHT')">▶</button>
            </div>

            <button id="final-btn" class="btn-primary" style="display:none; margin-top:20px;" onclick="redirect()">GO TO LINK</button>
        </div>

        <div class="ad-box" style="margin-top:20px;">
            <script async src="https://ad.a-ads.com/2429249.js?size=320x100"></script>
        </div>
    </div>

    <script>
        let timeLeft = 30;
        let target = "";
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1, dy = 0;
        let box = 15;

        function generate() {
            const link = document.getElementById('targetLink').value;
            if(!link.includes('http')) return alert("Invalid Link!");
            const final = window.location.href.split('?')[0] + "?access=" + btoa(link);
            document.getElementById('result').style.display = "block";
            document.getElementById('result').innerHTML = `<p style='font-size:0.7rem;'>Share this:</p><input value="${final}" readonly><button onclick="navigator.clipboard.writeText('${final}');alert('Copied!')">COPY</button>`;
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.get('access')) {
                target = atob(p.get('access'));
                document.getElementById('setup-view').style.display = "none";
                document.getElementById('unlock-view').style.display = "block";
                document.getElementById('game-canvas').style.display = "block";
                document.getElementById('controls').style.display = "grid";
                startSystem();
            }
        };

        function startSystem() {
            const t = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(t);
                    document.getElementById('game-canvas').style.display = "none";
                    document.getElementById('controls').style.display = "none";
                    document.getElementById('final-btn').style.display = "block";
                }
            }, 1000);
            gameLoop();
        }

        function gameLoop() {
            if(timeLeft <= 0) return;
            setTimeout(() => {
                ctx.clearRect(0,0,300,300);
                let head = {x: snake[0].x + dx, y: snake[0].y + dy};
                
                // Wall Wrap
                if(head.x >= 20) head.x = 0; if(head.x < 0) head.x = 19;
                if(head.y >= 20) head.y = 0; if(head.y < 0) head.y = 19;

                snake.unshift(head);
                if(head.x === food.x && head.y === food.y) {
                    food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                } else { snake.pop(); }

                ctx.fillStyle = "red"; ctx.fillRect(food.x*box, food.y*box, box, box);
                ctx.fillStyle = "#0f0";
                snake.forEach(s => ctx.fillRect(s.x*box, s.y*box, box, box));
                gameLoop();
            }, 150);
        }

        function changeDir(d) {
            if(d==='UP' && dy===0) { dx=0; dy=-1; }
            if(d==='DOWN' && dy===0) { dx=0; dy=1; }
            if(d==='LEFT' && dx===0) { dx=-1; dy=0; }
            if(d==='RIGHT' && dx===0) { dx=1; dy=0; }
        }

        function redirect() { window.location.href = target; }
    </script><!-- BEGIN AADS AD UNIT 2429283 -->

<div id="frame" style="width: 728px;margin: auto;z-index: 99998;height: auto">
          <iframe data-aa='2429283' src='//ad.a-ads.com/2429283/?size=728x90'
                            style='border:0; padding:0; width:728px; height:90px; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

<!-- END AADS AD UNIT 2429283 -->
</body>
</html>
